<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Customers</h2>

<a href="/customers/new" class="btn btn-primary mb-3">Add Customer</a>

<table class="table table-bordered table-striped">
  <thead>
  <tr>
    <th>ID</th>
    <th>First</th>
    <th>Last</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Created</th>
    <th>Action</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="c : ${customers}">
    <td th:text="${c.customerId}"></td>
    <td th:text="${c.firstName}"></td>
    <td th:text="${c.lastName}"></td>
    <td th:text="${c.email}"></td>
    <td th:text="${c.phone}"></td>
    <td th:text="${c.createdAt}"></td>
    <td>
      <a th:href="@{/customers/delete/{id}(id=${c.customerId})}" class="btn btn-danger btn-sm"
         onclick="return confirm('Delete this customer?');">Delete</a>
    </td>
  </tr>
  </tbody>
</table>

<a href="/" class="btn btn-secondary">Back</a>

</body>
</html>
