<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<!-- header for products management page -->
<h1 class="text-center mb-4">Products</h1>

<!-- button to navigate to product creation form -->
<div class="mb-3 text-center">
  <a class="btn btn-primary" th:href="@{/products/new}">Add Product</a>
</div>

<table class="table table-bordered table-striped">
  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Description</th>
    <th>Action</th>
  </tr>
  </thead>
  <tbody>
  <!-- iterate over product list passed by controller -->
  <tr th:each="p : ${products}">
    <!-- display product fields -->
    <td th:text="${p.productId}"></td>
    <td th:text="${p.productName}"></td>
    <td th:text="${p.price}"></td>
    <td th:text="${p.description}"></td>
    <td>
      <!-- deletion form posts back to controller -->
      <form th:action="@{|/products/${p.productId}/delete|}" method="post" style="display:inline;">
        <button class="btn btn-danger btn-sm" type="submit">Delete</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<div class="text-center">
  <a class="btn btn-secondary" th:href="@{/}">Back</a>
</div>

</body>
</html>
