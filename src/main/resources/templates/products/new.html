<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="text-center mb-4">Add Product</h1>

<form th:action="@{/products}" th:object="${product}" method="post" class="mx-auto" style="max-width: 600px;">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input class="form-control" th:field="*{productName}" required />
  </div>

  <div class="mb-3">
    <label class="form-label">Price</label>
    <input class="form-control" th:field="*{price}" required />
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <input class="form-control" th:field="*{description}" />
  </div>

  <div class="d-flex gap-2 justify-content-center">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-secondary" th:href="@{/products}">Cancel</a>
  </div>
</form>

</body>
</html>
