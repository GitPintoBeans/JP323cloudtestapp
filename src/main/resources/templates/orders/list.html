<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="container">
    <h1>Orders</h1>

    <a class="btn btn-primary" th:href="@{/orders/new}">Add Order</a>

    <table class="table mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Total</th>
            <th># Items</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${orders}">
            <td th:text="${o.orderId}">1</td>
            <td th:text="${o.orderDate}">2026-02-23</td>
            <td th:text="${o.customer.firstName + ' ' + o.customer.lastName}">Name</td>
            <td th:text="${o.totalAmount}">0.00</td>
            <td th:text="${o.items.size()}">0</td>
            <td>
                <form th:action="@{'/orders/delete/' + ${o.orderId}}" method="post">
                    <button class="btn btn-danger" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="btn btn-secondary" th:href="@{/}">Back</a>
</div>
</body>
</html>
