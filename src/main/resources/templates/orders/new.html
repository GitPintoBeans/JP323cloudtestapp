<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Add Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<!-- page heading -->
<h1 class="text-center mb-4">Add Order</h1>

<!-- form bound to OrderCreateForm model, posts to create endpoint -->
<form th:action="@{/orders}" th:object="${form}" method="post" class="mx-auto" style="max-width: 900px;">

  <!-- select input for choosing customer from list provided by controller -->
  <div class="mb-3">
    <label class="form-label">Customer</label>
    <select class="form-select" th:field="*{customerId}" required>
      <option value="" disabled selected>Select a customer...</option>
      <option th:each="c : ${customers}" th:value="${c.customerId}"
              th:text="${c.firstName + ' ' + c.lastName + ' (' + c.email + ')'}"></option>
    </select>
  </div>

  <!-- table listing products with quantity inputs -->
  <h5 class="mt-4">Products (enter quantity)</h5>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody>
      <!-- iterate through available products, creating quantity inputs -->
      <tr th:each="p : ${products}">
        <td th:text="${p.productName}"></td>
        <td th:text="${p.price}"></td>
        <td style="max-width: 160px;">
          <input class="form-control"
                 type="number"
                 min="0"
                 th:name="${'quantities[' + p.productId + ']'}"
                 value="0" />
        </td>
      </tr>
    </tbody>
  </table>

  <div class="d-flex gap-2 justify-content-center mt-3">
    <button class="btn btn-primary" type="submit">Create Order</button>
    <a class="btn btn-secondary" th:href="@{/orders}">Cancel</a>
  </div>
</form>

</body>
</html>
