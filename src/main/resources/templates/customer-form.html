<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Customer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Add Customer</h2>

<form th:action="@{/customers}" th:object="${customer}" method="post">

  <div class="mb-3">
    <label class="form-label">First Name</label>
    <input type="text" th:field="*{firstName}" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Last Name</label>
    <input type="text" th:field="*{lastName}" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" th:field="*{email}" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Phone</label>
    <input type="text" th:field="*{phone}" class="form-control" placeholder="Optional">
  </div>

  <button type="submit" class="btn btn-success">Save</button>
  <a href="/customers" class="btn btn-secondary">Cancel</a>
</form>

</body>
</html>
